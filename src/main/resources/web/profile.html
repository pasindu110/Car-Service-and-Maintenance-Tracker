<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>User Profile – CarTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #f6f5f7;
    font-family: 'Inter', sans-serif;
    color: #333;
}

nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 60px;
    background: #fff;
    border-bottom: 1px solid #f0f0f0;
}
.nav-logo { font-size: 15px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #1a1a1a; text-decoration: none; }
.back-link { font-size: 14px; font-weight: 600; color: #512da8; text-decoration: none; display: flex; align-items: center; gap: 8px; }

.profile-container {
    max-width: 600px;
    margin: 60px auto;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 10px 20px rgba(0,0,0,0.05);
    padding: 40px;
    text-align: center;
}

.avatar {
    width: 100px;
    height: 100px;
    background: linear-gradient(to right, #673ab7, #512da8);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    font-weight: 700;
    margin: 0 auto 20px;
}

h1 { font-size: 24px; margin-bottom: 5px; }
p.email { color: #888; font-size: 14px; margin-bottom: 30px; }

.info-box {
    background: #f8f8f6;
    padding: 20px;
    border-radius: 8px;
    text-align: left;
    margin-bottom: 30px;
}
.info-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #eee;
}
.info-row:last-child { border-bottom: none; }
.info-label { font-size: 13px; color: #666; font-weight: 500; }
.info-value { font-size: 14px; font-weight: 600; color: #1a1a1a; }

.btn-logout {
    background: #e74c3c;
    color: #fff;
    border: none;
    padding: 12px 30px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: 0.2s;
}
.btn-logout:hover { background: #c0392b; }
</style>
</head>
<body>

<nav>
    <a href="index.html" class="nav-logo">CarTracker</a>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
</nav>

<div class="profile-container">
    <div class="avatar" id="avatarInitial">U</div>
    <h1 id="profileName">Loading...</h1>
    <p class="email" id="profileEmail">Loading...</p>

    <div class="info-box">
        <div class="info-row">
            <span class="info-label">Account Status</span>
            <span class="info-value" style="color:#2ecc71;">Active</span>
        </div>
        <div class="info-row">
            <span class="info-label">Registered Vehicles</span>
            <span class="info-value">0 (Feature coming soon)</span>
        </div>
        <div class="info-row">
            <span class="info-label">Member Since</span>
            <span class="info-value">Just now</span>
        </div>
    </div>

    <button class="btn-logout" id="logoutBtn">Logout</button>
</div>

<script>
    if (localStorage.getItem('userLoggedIn') !== 'true') {
        window.location.href = "login.html"; // Redirect if not logged in
    }

    const userName = localStorage.getItem('userName') || 'User';
    const userEmail = localStorage.getItem('userEmail') || 'No Email';
    
    document.getElementById('profileName').textContent = userName;
    document.getElementById('profileEmail').textContent = userEmail;
    document.getElementById('avatarInitial').textContent = userName.charAt(0).toUpperCase();

    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = "index.html";
    });
</script>
</body>
</html>
