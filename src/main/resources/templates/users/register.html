<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register – Car Service Tracker</title>
    <link rel="stylesheet" href="../../static/css/styles.css">
</head>
<body>
    <h1>Create Account</h1>
    <!-- TODO: Registration form → sends RegisterUserRequest DTO to UserController -->
    <form id="registerForm">
        <label>Full Name: <input type="text" id="fullName" name="fullName"></label><br>
        <label>Username:  <input type="text" id="username" name="username"></label><br>
        <label>Email:     <input type="email" id="email" name="email"></label><br>
        <label>Phone:     <input type="tel" id="phone" name="phone"></label><br>
        <label>Password:  <input type="password" id="password" name="password"></label><br>
        <label>Confirm:   <input type="password" id="confirmPassword" name="confirmPassword"></label><br>
        <label>Role:
            <select id="role" name="role">
                <option value="CUSTOMER">Customer</option>
                <option value="MECHANIC">Mechanic</option>
                <option value="ADMIN">Admin</option>
            </select>
        </label><br>
        <button type="submit">Register</button>
    </form>
    <script src="../../static/js/app.js"></script>
</body>
</html>
